<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Destaque Divino</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #f3f4f6;
      font-family: Arial, sans-serif;
    }

    .fade {
      animation: fade .3s ease;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

<div class="max-w-md mx-auto min-h-screen bg-white shadow-2xl overflow-hidden">

  <!-- HEADER -->
  <div class="bg-gradient-to-r from-blue-700 to-blue-500 p-5 text-white">
    <h1 class="text-3xl font-bold">
      Destaque Divino
    </h1>

    <p class="opacity-90 mt-1">
      Vote nas melhores empresas da cidade
    </p>
  </div>

  <!-- APP -->
  <div id="app"></div>

  <!-- RODAPÉ -->
  <div class="text-center py-6 text-xs text-gray-400">
    © Destaque Divino 2026

    <div class="mt-2">
</html>
